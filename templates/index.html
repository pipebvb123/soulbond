{% extends 'base.html' %}

{% block content %}

<section class="hero">
    <h2>NEW DROP</h2>
</section>

<div class="grid">
    {% for product in products %}
    <div class="card">
        <img src="{{ product.image }}">
        <h3>{{ product.name }}</h3>

        <p>
{% if product.rating %}
    {% for i in range(product.rating) %}
    ⭐
    {% endfor %}
{% endif %}
        </p>

        <p>${{ product.price }}</p>

        <a href="/product/{{ product.id }}" class="btn">Ver</a>
        <a href="/add_to_cart/{{ product.id }}" class="btn">Agregar</a>
    </div>
    {% endfor %}
</div>

{% endblock %}
